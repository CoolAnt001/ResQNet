name: Deploy to GitHub Pages

on:
  push:
    branches: [\"main\"] # Change this if your main branch is named differently

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Environment Variables
        run: |
          mkdir -p web_mesh
          echo "${{ secrets.ENV_JS_CONTENT }}" > web_mesh/env.js
        # This creates the directory if it doesn't exist, then creates env.js

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web_mesh' # Only host the web_mesh folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
